server:
  port: 8082
  address: 0.0.0.0

spring:
  application:
    name: PrintDrawingSearch

  datasource:
    url: jdbc:mysql://localhost:3306/printdrawingsdatabase?createDatabaseIfNotExist=true
    username: root
    password: five2one
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

jpa:
  hibernate:
    ddl-auto: update # Change 'validate' to 'update' so Hibernate can create missing pieces
  properties:
    hibernate:
      # This is the correct Spring Boot 3 / Hibernate 6 property
      id:
        db_structure_naming_strategy: legacy

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    # Ensures Flyway uses the same datasource defined above
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

# Add this to see the ACTUAL error if it fails again
logging:
  level:
    org.springframework: ERROR
    com.printdrawingsearch: DEBUG